<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บทเรียนที่ 2: ตัวแปร และ ชนิดข้อมูล</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

<!-- ส่วนหัวของเว็บ -->
<header class="bg-white shadow-md w-full">
  <div class="container mx-auto px-6 py-4 flex justify-between items-center">
    <div>
      <h2 class="text-xl font-semibold text-gray-700">หน่วยที่ 2: Python</h2>
      <h1 class="text-2xl font-bold text-blue-800">โมดูลที่ 2: ตัวแปร และ ชนิดข้อมูล</h1>
    </div>
    <a href="index.html" class="text-blue-600 hover:underline">กลับหน้าหลัก</a>
  </div>
</header>

<!-- เนื้อหาหลัก (2 คอลัมน์) -->
<main class="flex-1 container mx-auto px-6 py-6 flex flex-col md:flex-row gap-6 overflow-y-auto">

  <!-- คอลัมน์ซ้าย: วิดีโอและสถานะ -->
  <div class="w-full md:w-1/2 bg-white rounded-xl shadow-lg p-6">
    <h3 class="text-xl font-bold text-gray-800 mb-4">🎬 1. ดูวิดีโอ</h3>

    <!-- พื้นที่สำหรับ YouTube Player -->
    <div class="aspect-video bg-gray-800 rounded-lg mb-4">
      <div id="player"></div>
    </div>

    <!-- ระบบติดตามความคืบหน้า -->
    <div>
      <h4 class="font-semibold text-gray-700">ความคืบหน้า:</h4>
      <div class="w-full bg-gray-200 rounded-full h-2.5 mt-2 mb-1">
        <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
      </div>
      <div id="video-status" class="text-sm text-gray-500">สถานะ: ยังไม่เริ่มเรียน</div>
    </div>
  </div>

  <!-- คอลัมน์ขวา: แบบฝึกหัด (Quiz แบบกรอกคำตอบ) -->
  <div class="w-full md:w-1/2 bg-white rounded-xl shadow-lg p-6 flex flex-col">

    <!-- 1. กล่องสนทนาคุณครู (ส่วนโจทย์) -->
    <div class="flex items-start gap-4 mb-6">
      <!-- รูปคุณครู (Placeholder) -->
      <img src="https://i.ibb.co/vvmFnzs5/2.pngู" alt="คุณครู" class="rounded-full w-24 h-24 border-4 border-white shadow-md flex-shrink-0">

      <!-- กล่องคำพูด -->
      <div class="relative bg-blue-50 border border-blue-200 p-4 rounded-xl shadow-sm mt-4">
        <!-- หางของกล่องคำพูด -->
        <div class="absolute left-0 top-1/2 -translate-x-full -translate-y-1/2 w-0 h-0
                                border-t-[10px] border-t-transparent
                                border-r-[12px] border-r-blue-50
                                border-b-[10px] border-b-transparent"
             style="filter: drop-shadow(-1px 0px 1px rgba(0,0,0,0.05));">
        </div>

        <h3 class="text-xl font-bold text-gray-800 mb-2">✍️ 2. แบบทดสอบความเข้าใจ</h3>
        <p class="text-gray-700">
          <strong>โจทย์:</strong> ให้นักเรียนตอบคำถามต่อไปนี้ เพื่อทดสอบความเข้าใจเรื่องกฎของตัวแปรดูนะครับ
        </p>
      </div>
    </div>

    <!-- 2. ส่วนของคำถาม -->
    <div class="space-y-4">
      <div>
        <label for="q1" class="block text-sm font-medium text-gray-700">1. ชื่อตัวแปร <code class="bg-gray-200 p-1 rounded">1student</code> (ผิด) ... ผิดเพราะอะไร?</label>
        <input type="text" id="q1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="ตอบคำถาม...">
        <div id="q1-feedback" class="text-sm mt-1"></div>
      </div>
      <div>
        <label for="q2" class="block text-sm font-medium text-gray-700">2. ชื่อตัวแปร <code class="bg-gray-200 p-1 rounded">my score</code> (ผิด) ... ผิดเพราะอะไร?</label>
        <input type="text" id="q2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="ตอบคำถาม...">
        <div id="q2-feedback" class="text-sm mt-1"></div>
      </div>
      <div>
        <label for="q3" class="block text-sm font-medium text-gray-700">3. ข้อมูล <code class="bg-gray-200 p-1 rounded">15</code> เป็นชนิด (Type) อะไร?</label>
        <input type="text" id="q3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="เช่น int, float, string...">
        <div id="q3-feedback" class="text-sm mt-1"></div>
      </div>
      <div>
        <label for="q4" class="block text-sm font-medium text-gray-700">4. ข้อมูล <code class="bg-gray-200 p-1 rounded">"Hello"</code> เป็นชนิด (Type) อะไร?</label>
        <input type="text" id="q4" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="เช่น int, float, string...">
        <div id="q4-feedback" class="text-sm mt-1"></div>
      </div>
    </div>

    <!-- 3. ผลลัพธ์รวม (กล่องคำพูดตอบกลับจากครู) -->
    <div id="teacher-feedback" class="mt-6 flex items-start gap-4 hidden">
      <!-- รูปคุณครู (ซ้ำเพื่อความชัดเจน) -->
      <img src="https://i.ibb.co/vvmFnzs5/2.png" alt="คุณครู" class="rounded-full w-24 h-24 border-4 border-white shadow-md flex-shrink-0">

      <!-- กล่องคำพูดตอบกลับ -->
      <div id="teacher-bubble" class="relative bg-gray-100 p-4 rounded-xl shadow-sm mt-4">
        <!-- หางของกล่องคำพูด -->
        <div id="teacher-bubble-tail" class="teacher-bubble-tail absolute left-0 top-1/2 -translate-x-full -translate-y-1/2 w-0 h-0
                                border-t-[10px] border-t-transparent
                                border-r-[12px] border-r-gray-100
                                border-b-[10px] border-b-transparent"
             style="filter: drop-shadow(-1px 0px 1px rgba(0,0,0,0.05));">
        </div>
        <p id="teacher-message" class="text-gray-700"></p>
      </div>
    </div>
  </div>

</main>

<!-- แถบส่งงาน (Footer) -->
<footer class="bg-white shadow-inner w-full p-4 mt-auto">
  <div class="container mx-auto px-6 flex justify-between items-center">
    <div id="submit-status" class="text-gray-500">
      กรุณาดูวิดีโอให้จบก่อน
    </div>
    <div>
      <button id="submit-btn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
        ตรวจคำตอบ
      </button>
      <button id="next-btn" class="bg-gray-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-600 transition-colors ml-4 hidden">
        ไปบทเรียนถัดไป
      </button>
    </div>
  </div>
</footer>

<script>
  // 1. โหลด YouTube IFrame API
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  var progressInterval;
  const submitBtn = document.getElementById('submit-btn');
  const nextBtn = document.getElementById('next-btn');
  const videoStatus = document.getElementById('video-status');
  const submitStatus = document.getElementById('submit-status');
  const progressBar = document.getElementById('progress-bar');

  // --- ตัวแปรสำหรับ Quiz ---
  const q1 = document.getElementById('q1');
  const q2 = document.getElementById('q2');
  const q3 = document.getElementById('q3');
  const q4 = document.getElementById('q4');
  const q1Feedback = document.getElementById('q1-feedback');
  const q2Feedback = document.getElementById('q2-feedback');
  const q3Feedback = document.getElementById('q3-feedback');
  const q4Feedback = document.getElementById('q4-feedback');

  // --- ตัวแปรใหม่สำหรับ Teacher Feedback ---
  const teacherFeedback = document.getElementById('teacher-feedback');
  const teacherMessage = document.getElementById('teacher-message');
  const teacherBubble = document.getElementById('teacher-bubble');
  const teacherBubbleTail = document.getElementById('teacher-bubble-tail');

  let videoWatched = false;

  // 2. ฟังก์ชันนี้จะทำงานเมื่อ API พร้อม
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: 'ZoTCNQI4PBg', // <-- *** ใส่ Video ID โมดูล 2 ที่นี่ ***
      playerVars: {
        'playsinline': 1, 'modestbranding': 1, 'rel': 0
      },
      events: {
        'onStateChange': onPlayerStateChange
      }
    });
  }

  // 3. ฟังก์ชันนี้ทำงานเมื่อสถานะวิดีโอเปลี่ยน
  function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
      videoStatus.textContent = "สถานะ: กำลังเรียน...";
      progressInterval = setInterval(updateProgress, 1000);
    } else {
      clearInterval(progressInterval);
    }

    if (event.data == YT.PlayerState.ENDED) {
      videoStatus.textContent = "สถานะ: ✅ เรียนจบแล้ว!";
      videoStatus.classList.add('text-green-600', 'font-semibold');
      progressBar.style.width = '100%';

      videoWatched = true;
      checkEnableSubmit();
    }
  }

  // 4. ฟังก์ชันอัปเดตแถบความคืบหน้า
  function updateProgress() {
    if (player && player.getPlayerState() == YT.PlayerState.PLAYING) {
      var currentTime = player.getCurrentTime();
      var duration = player.getDuration();
      var percentage = (currentTime / duration) * 100;
      progressBar.style.width = percentage + '%';
    }
  }

  // --- 5. ฟังก์ชันใหม่: ตรวจสอบเงื่อนไขเพื่อเปิดปุ่ม ---
  function checkEnableSubmit() {
    if (videoWatched) {
      submitBtn.disabled = false;
      submitStatus.textContent = "✅ ดูวิดีโอจบแล้ว! พร้อมตรวจคำตอบ";
      submitStatus.classList.add('text-green-600');
    } else {
      submitStatus.textContent = "กรุณาดูวิดีโอให้จบก่อน";
      submitStatus.classList.remove('text-green-600');
    }
  }

  // --- 6. Logic การส่งงาน (ปรับปรุงใหม่) ---
  submitBtn.addEventListener('click', function() {
    let score = 0;

    // --- ระบบตรวจคำตอบอัตโนมัติ (Auto-Grader) ---
    // นี่คือการจำลองการตรวจแบบง่าย

    // ตรวจข้อ 1
    let ans1 = q1.value.toLowerCase().trim();
    if (ans1.includes("ตัวเลข") || ans1.includes("number")) {
      score++;
      q1Feedback.textContent = "✅ ถูกต้องครับ! (ห้ามขึ้นต้นด้วยตัวเลข)";
      q1Feedback.className = "text-sm mt-1 text-green-600";
    } else {
      q1Feedback.textContent = "❌ ยังไม่ถูกครับ (คำใบ้: กฎข้อแรกคือห้ามขึ้นต้นด้วยอะไร?)";
      q1Feedback.className = "text-sm mt-1 text-red-600";
    }
    let ans2 = q2.value.toLowerCase().trim();
    if (ans2.includes("ช่องว่าง") || ans2.includes("space")) {
      score++;
      q2Feedback.textContent = "✅ ถูกต้องครับ! (ห้ามขึ้นต้นด้วยตัวเลข)";
      q2Feedback.className = "text-sm mt-1 text-green-600";
    } else {
      q2Feedback.textContent = "❌ ยังไม่ถูกครับ (คำใบ้: กฎข้อแรกคือห้ามขึ้นต้นด้วยอะไร?)";
      q2Feedback.className = "text-sm mt-1 text-red-600";
    }
    let ans3 = q3.value.toLowerCase().trim();
    if (ans3.includes("int") || ans3.includes("จำนวนเต็ม")) {
      score++;
      q3Feedback.textContent = "✅ ถูกต้องครับ! (ห้ามขึ้นต้นด้วยตัวเลข)";
      q3Feedback.className = "text-sm mt-1 text-green-600";
    } else {
      q3Feedback.textContent = "❌ ยังไม่ถูกครับ (คำใบ้: กฎข้อแรกคือห้ามขึ้นต้นด้วยอะไร?)";
      q3Feedback.className = "text-sm mt-1 text-red-600";
    }
    let ans4 = q4.value.toLowerCase().trim();
    if (ans4.includes("string") || ans4.includes("ตัวอักษร")) {
      score++;
      q4Feedback.textContent = "✅ ถูกต้องครับ! (ห้ามขึ้นต้นด้วยตัวเลข)";
      q4Feedback.className = "text-sm mt-1 text-green-600";
    } else {
      q4Feedback.textContent = "❌ ยังไม่ถูกครับ (คำใบ้: กฎข้อแรกคือห้ามขึ้นต้นด้วยอะไร?)";
      q4Feedback.className = "text-sm mt-1 text-red-600";
    }

    // แสดงสรุปผล (แบบใหม่)
    teacherFeedback.classList.remove('hidden');

    if (score === 4) {
      // --- กรณีตอบถูกหมด ---
      teacherMessage.innerHTML = "🎉 <strong>ยอดเยี่ยมมาก!</strong><br>คุณเข้าใจกฎพื้นฐานทั้งหมดแล้ว (ได้ 4/4) ไปบทต่อไปได้เลยครับ";
      teacherBubble.className = "relative bg-green-100 border border-green-300 p-4 rounded-xl shadow-sm mt-4";
      teacherBubbleTail.className = "teacher-bubble-tail absolute left-0 top-1/2 -translate-x-full -translate-y-1/2 w-0 h-0 border-t-[10px] border-t-transparent border-r-[12px] border-r-green-100 border-b-[10px] border-b-transparent";

      submitStatus.textContent = "🎉 ผ่านแล้ว! ไปบทเรียนต่อไปได้";
      submitBtn.disabled = true;
      submitBtn.textContent = "ผ่านแล้ว";
      nextBtn.classList.remove('hidden');
    } else {
      // --- กรณีตอบผิด ---
      teacherMessage.innerHTML = `<strong>ลองอีกครั้งนะ!</strong><br>คุณทำได้ ${score} เต็ม 4 ข้อครับ ลองแก้ไขข้อที่ผิด (ที่มี ❌) แล้วกดตรวจคำตอบอีกครั้งครับ`;
      teacherBubble.className = "relative bg-red-100 border border-red-300 p-4 rounded-xl shadow-sm mt-4";
      teacherBubbleTail.className = "teacher-bubble-tail absolute left-0 top-1/2 -translate-x-full -translate-y-1/2 w-0 h-0 border-t-[10px] border-t-transparent border-r-[12px] border-r-red-100 border-b-[10px] border-b-transparent";

      submitStatus.textContent = "ลองตรวจคำตอบอีกครั้ง";
    }
  });

  nextBtn.addEventListener('click', function() {
    // ในระบบจริง: ให้ลิงก์ไปหน้า module_3.html
    alert("กำลังไปบทเรียนถัดไป...");
    window.location.href = 'module_3.html';
  });

</script>
</body>
</html>
